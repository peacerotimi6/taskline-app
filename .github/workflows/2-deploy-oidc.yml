# 1) Pipeline goal:
# Run lint -> build -> smoke-test -> deploy -> cleanup for Azure Web App via OIDC.

name: Azure OIDC Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # 2) Lint job: fast static checks before build/deploy.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  # 3) Build job: creates production output and uploads deploy artifact.
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: |
            dist
            server.js
            package.json

  # 4) Smoke-test job: starts the built app and checks it responds.
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webapp-package
      - run: PORT=5050 node server.js & sleep 2
      - run: curl -fsS http://127.0.0.1:5050/app-config.js

  # 5) Deploy job: publish only after lint, build, and smoke-test pass.
  deploy:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webapp-package
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .

  # 6) Cleanup job: always runs and writes final status summary.
  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - build
      - smoke-test
      - deploy
    steps:
      - run: echo "Pipeline finished. Check job results above."
