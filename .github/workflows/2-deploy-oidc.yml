# ============================================================
# CHALLENGE 2 — Deploy to Azure Web App (OIDC)
# ============================================================
#
# WHAT IS OIDC?
#   No stored credential. GitHub and Azure trust each other directly.
#   Azure issues a short-lived token per run — nothing to rotate or leak.
#
# BEFORE THIS WORKS — one-time Azure setup:
#   1. Create an App Registration in Microsoft Entra ID
#   2. App Registration → Certificates & secrets → Federated credentials
#      → Add credential → GitHub Actions → fill in your repo → Branch: main
#   3. Assign the App Registration "Contributor" role on your Web App:
#      App Service → Access control (IAM) → Add role assignment
#
# SECRETS TO CREATE:
#
#   AZURE_CLIENT_ID
#     → Entra ID → App registrations → your app → Application (client) ID
#
#   AZURE_TENANT_ID
#     → Entra ID → Overview → Tenant ID
#
#   AZURE_SUBSCRIPTION_ID
#     → Azure Portal → Subscriptions → your subscription → Subscription ID
#
#   AZURE_WEBAPP_NAME
#     → Same Web App name as Challenge 1
#
# ============================================================

name: Deploy to Azure Web App (OIDC)

on:
  push:
    branches:
      - main

# Required for OIDC — do not remove these
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # - name: Run tests
      #   run: npm test

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}