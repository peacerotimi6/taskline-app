# 1) Pipeline goal: lint -> build -> smoke-test -> deploy -> cleanup using Azure publish profile.

name: Azure Publish Profile Pipeline

on:
  workflow_dispatch:

jobs:
  # 2) Lint job: run repo safety checks first.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  # 3) Build job: create production output and upload deploy artifact.
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: |
            dist
            server.js
            package.json

  # 4) Smoke-test job: prove the built app starts before deploy.
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webapp-package
      - run: PORT=5050 node server.js & sleep 2
      - run: curl -fsS http://127.0.0.1:5050/app-config.js

  # 5) Deploy job: publish to Azure Web App with stored publish profile.
  deploy:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webapp-package
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

  # 6) Cleanup job: always leave a final status note.
  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, build, smoke-test, deploy]
    steps:
      - run: echo "Publish profile pipeline finished."
