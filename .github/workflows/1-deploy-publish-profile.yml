# ============================================================
# CHALLENGE 1 — Deploy to Azure Web App (Publish Profile)
# ============================================================
#
# SECRETS TO CREATE (repo → Settings → Secrets → Actions):
#
#   AZURE_WEBAPP_NAME
#     → Your Web App name in Azure
#     → Azure Portal → App Services → your app → name at the top
#
#   AZURE_WEBAPP_PUBLISH_PROFILE
#     → Azure Portal → App Services → your app
#       → Overview → "Get publish profile" → open the downloaded file → copy all the XML
#
# ============================================================

name: Deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Uncomment this step if you add a test script to package.json
      # - name: Run tests
      #   run: npm test

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}