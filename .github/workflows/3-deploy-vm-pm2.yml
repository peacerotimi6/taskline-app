# 1) Pipeline goal: lint -> build -> smoke-test -> deploy -> cleanup to Azure VM via SSH + PM2.

name: Azure VM PM2 Pipeline

# on:
#   workflow_dispatch:

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
  # 2) Lint job: fail fast on repo issues.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  # 3) Build job: install, build, and upload artifact for later jobs.
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: vm-package
          path: .

  # 4) Smoke-test job: start app locally and verify a simple endpoint.
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vm-package
      - run: npm ci
      - run: PORT=5050 node server.js & sleep 2
      - run: curl -fsS http://127.0.0.1:5050/app-config.js

  # 5) Deploy job: SSH into VM, update code, build, and restart PM2 app.
  deploy:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VM_APP_DIR }}
            git pull origin main
            npm install
            npm run build
            pm2 restart ${{ secrets.PM2_APP_NAME }} || pm2 start npm --name ${{ secrets.PM2_APP_NAME }} -- start

  # 6) Cleanup job: always emit a final completion line.
  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, build, smoke-test, deploy]
    steps:
      - run: echo "VM pipeline finished."
