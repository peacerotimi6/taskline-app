# ============================================================
# CHALLENGE 3 — Deploy to Azure VM via SSH using PM2
# ============================================================
#
# ONE-TIME SETUP ON THE VM (SSH in and run these before the pipeline runs):
#
#   curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
#   sudo apt-get install -y nodejs
#   sudo npm install -g pm2
#   git clone https://github.com/YOUR_ORG/YOUR_REPO.git ~/your-app
#   cd ~/your-app
#   npm install
#   pm2 start npm --name your-app -- run dev
#   pm2 save
#   pm2 startup   ← run the command it prints out
#
# SECRETS TO CREATE:
#
#   VM_HOST
#     → Azure Portal → Virtual Machines → your VM → Overview → Public IP address
#
#   VM_USERNAME
#     → The admin username you set when creating the VM (default: azureuser)
#
#   VM_SSH_PRIVATE_KEY
#     → If you downloaded a .pem during VM creation: open it, copy all the text
#     → To generate a fresh pair:
#         ssh-keygen -t rsa -b 4096 -f ~/.ssh/vm_key
#         Upload vm_key.pub via: Azure Portal → VM → Help → Reset password → Public key mode
#         Paste the contents of vm_key (private key) as the secret value
#
#   VM_APP_DIR
#     → Full path to your app on the VM, e.g. /home/azureuser/your-app
#
#   PM2_APP_NAME
#     → The --name value from your pm2 start command, e.g. your-app
#
# ============================================================

name: Deploy to Azure VM (PM2)

on:
  push:
    branches:
      - main

jobs:

  # ── JOB 1: Install ───────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # - name: Run tests
      #   run: npm test


  # ── JOB 2: Deploy to VM over SSH ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VM_APP_DIR }}
            git pull origin main
            npm install
            pm2 restart ${{ secrets.PM2_APP_NAME }} || pm2 start npm --name ${{ secrets.PM2_APP_NAME }} -- run dev